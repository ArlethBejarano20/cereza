<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de pacientes - CAICH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../styles/auth.css" />
    <style>
      .admin-layout-single {
        margin-top: 0.5rem;
      }

      .admin-card {
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.9);
        padding: 1rem 1rem 0.9rem;
      }

      .admin-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }

      .admin-card-header h3 {
        margin: 0;
        font-size: 0.95rem;
      }

      .admin-actions {
        display: flex;
        gap: 0.5rem;
      }

      .btn-outline {
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.8);
        padding: 0.4rem 0.7rem;
        background: transparent;
        color: #e5e7eb;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .btn-outline:hover {
        background: rgba(30, 64, 175, 0.6);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }

      th,
      td {
        padding: 0.45rem 0.4rem;
        border-bottom: 1px solid rgba(31, 41, 55, 0.9);
      }

      th {
        text-align: left;
        font-weight: 500;
        color: #9ca3af;
      }

      tbody tr:hover {
        background: rgba(15, 23, 42, 0.7);
      }

      .tag {
        display: inline-flex;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        font-size: 0.7rem;
      }

      .table-actions button {
        margin-right: 0.25rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.8);
        background: transparent;
        color: #e5e7eb;
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        cursor: pointer;
      }

      .table-actions button[data-action="delete"] {
        border-color: rgba(248, 113, 113, 0.9);
        color: #fecaca;
      }

      .inline-form {
        margin-top: 0.75rem;
        border-top: 1px solid rgba(31, 41, 55, 0.9);
        padding-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-brand">
        <h1>CAICH</h1>
        <span>Administración · Pacientes</span>
      </div>

      <div class="auth-card admin-layout-single">
        <div class="auth-card-inner">
          <header class="admin-card-header">
            <h3>Pacientes registrados</h3>
            <div class="admin-actions">
              <button id="new-patient-btn" class="btn-outline">Nuevo paciente</button>
              <a href="./dashboard.html" class="auth-link">Volver al panel</a>
            </div>
          </header>

          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Identificador</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="patients-body"></tbody>
          </table>

          <div id="patient-form-container" class="inline-form"></div>

          <div id="patients-message" class="auth-message"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "../js/supabaseClient.js";
      import { getCurrentUser, getMyRole } from "../js/auth.js";

      const tbody = document.getElementById("patients-body");
      const formContainer = document.getElementById("patient-form-container");
      const messageBox = document.getElementById("patients-message");
      const newPatientBtn = document.getElementById("new-patient-btn");

      function showMessage(text, type) {
        if (!messageBox) return;
        messageBox.textContent = text;
        messageBox.className = "auth-message";
        if (type === "error") {
          messageBox.classList.add("auth-message--error");
        } else if (type === "success") {
          messageBox.classList.add("auth-message--success");
        }
      }

      async function enforceAdmin() {
        const { data: user, error: userError } = await getCurrentUser();
        if (userError || !user) {
          window.location.href = "../login.html";
          return null;
        }

        const { data: role, error: roleError } = await getMyRole();
        if (roleError || role !== "admin") {
          window.location.href = "../login.html";
          return null;
        }
        return user;
      }

      async function loadPatients() {
        tbody.innerHTML = "";
        const { data, error } = await supabase
          .from("pacientes")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.error(error);
          showMessage("Error al cargar pacientes.", "error");
          return;
        }

        if (!data.length) {
          tbody.innerHTML = "<tr><td colspan='4'>No hay pacientes registrados.</td></tr>";
          return;
        }

        data.forEach((p) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${p.nombre_completo || "-"}</td>
            <td>${p.email || "-"}</td>
            <td><span class="tag">${p.id}</span></td>
            <td class="table-actions">
              <button data-action="edit" data-id="${p.id}">Editar</button>
              <button data-action="delete" data-id="${p.id}">Eliminar</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function renderForm(patient = null) {
        const isEdit = Boolean(patient);
        formContainer.innerHTML = `
          <form id="patient-form" class="auth-form">
            <div class="auth-row">
              <label class="auth-label" for="p-name">Nombre completo</label>
              <input
                id="p-name"
                name="nombre_completo"
                type="text"
                class="auth-input"
                required
                value="${patient?.nombre_completo || ""}"
              />
            </div>
            <div class="auth-row">
              <label class="auth-label" for="p-email">Correo electrónico</label>
              <input
                id="p-email"
                name="email"
                type="email"
                class="auth-input"
                value="${patient?.email || ""}"
              />
            </div>
            <div class="auth-footer-row">
              <button type="button" id="cancel-form" class="btn-outline">Cancelar</button>
              <button type="submit" class="auth-button">
                ${isEdit ? "Guardar cambios" : "Registrar paciente"}
              </button>
            </div>
          </form>
        `;

        const form = document.getElementById("patient-form");
        const cancelBtn = document.getElementById("cancel-form");

        cancelBtn?.addEventListener("click", () => {
          formContainer.innerHTML = "";
        });

        form?.addEventListener("submit", async (event) => {
          event.preventDefault();
          const formData = new FormData(form);
          const payload = {
            nombre_completo: formData.get("nombre_completo"),
            email: formData.get("email") || null
          };

          let result;
          if (isEdit) {
            result = await supabase
              .from("pacientes")
              .update(payload)
              .eq("id", patient.id)
              .select()
              .single();
          } else {
            result = await supabase.from("pacientes").insert(payload).select().single();
          }

          if (result.error) {
            console.error(result.error);
            showMessage(
              result.error.message || "No se pudo guardar el paciente.",
              "error"
            );
            return;
          }

          showMessage("Paciente guardado correctamente.", "success");
          formContainer.innerHTML = "";
          await loadPatients();
        });
      }

      tbody.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const action = target.dataset.action;
        const id = target.dataset.id;
        if (!action || !id) return;

        if (action === "edit") {
          const { data, error } = await supabase
            .from("pacientes")
            .select("*")
            .eq("id", id)
            .single();
          if (error) {
            console.error(error);
            showMessage("No se pudo cargar el paciente para edición.", "error");
            return;
          }
          renderForm(data);
        } else if (action === "delete") {
          if (!confirm("¿Eliminar este paciente? Esta acción no se puede deshacer.")) return;
          const { error } = await supabase.from("pacientes").delete().eq("id", id);
          if (error) {
            console.error(error);
            showMessage("No se pudo eliminar el paciente.", "error");
            return;
          }
          showMessage("Paciente eliminado.", "success");
          await loadPatients();
        }
      });

      newPatientBtn?.addEventListener("click", () => {
        renderForm(null);
      });

      (async function init() {
        const user = await enforceAdmin();
        if (!user) return;
        await loadPatients();
      })();
    </script>
  </body>
</html>
