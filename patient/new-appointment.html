<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nueva cita - Paciente · CAICH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../styles/auth.css" />
    <style>
      .wizard-steps {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        gap: 0.5rem;
        font-size: 0.8rem;
      }

      .wizard-step {
        flex: 1;
        text-align: center;
        padding: 0.5rem 0.4rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        color: #9ca3af;
        background: rgba(15, 23, 42, 0.5);
      }

      .wizard-step--active {
        border-color: rgba(56, 189, 248, 0.9);
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.4), #020617);
        color: #e5e7eb;
      }

      .wizard-step span {
        display: block;
        font-size: 0.75rem;
        opacity: 0.9;
      }

      .wizard-content {
        display: none;
      }

      .wizard-content--active {
        display: block;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .slot-button {
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.7);
        color: #e5e7eb;
        padding: 0.45rem 0.4rem;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
      }

      .slot-button:hover {
        background: rgba(56, 189, 248, 0.22);
        border-color: rgba(56, 189, 248, 0.9);
      }

      .slot-button[disabled] {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .slot-button--selected {
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        border-color: transparent;
      }

      .summary-list {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
      }

      .summary-list li {
        margin-bottom: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-brand">
        <h1>CAICH</h1>
        <span>Paciente · Nueva cita</span>
      </div>

      <div class="auth-card">
        <div class="auth-card-inner">
          <header class="auth-title">
            <h2>Agendar nueva cita</h2>
            <small>Flujo guiado en 3 pasos</small>
          </header>

          <div class="wizard-steps">
            <div class="wizard-step wizard-step--active" data-step-indicator="1">
              Paso 1
              <span>Psicólogo</span>
            </div>
            <div class="wizard-step" data-step-indicator="2">
              Paso 2
              <span>Fecha y hora</span>
            </div>
            <div class="wizard-step" data-step-indicator="3">
              Paso 3
              <span>Confirmar</span>
            </div>
          </div>

          <div id="step-1" class="wizard-content wizard-content--active">
            <form id="step-1-form" class="auth-form">
              <div class="auth-row">
                <label class="auth-label" for="psychologist-select">
                  Elige un psicólogo
                </label>
                <select
                  id="psychologist-select"
                  name="psychologistId"
                  class="auth-select"
                  required
                >
                  <option value="" disabled selected>Cargando psicólogos...</option>
                </select>
              </div>

              <div class="auth-row">
                <label class="auth-label" for="notes">
                  Motivo de la consulta (opcional)
                </label>
                <textarea
                  id="notes"
                  name="notes"
                  rows="3"
                  class="auth-input"
                  style="resize: vertical"
                  placeholder="Breve descripción del motivo o necesidad principal."
                ></textarea>
              </div>

              <button type="submit" class="auth-button">
                Continuar a fecha y hora
              </button>
            </form>
          </div>

          <div id="step-2" class="wizard-content">
            <form id="step-2-form" class="auth-form">
              <div class="auth-row">
                <label class="auth-label" for="date-input">
                  Selecciona una fecha
                </label>
                <input
                  id="date-input"
                  name="date"
                  type="date"
                  class="auth-input"
                  required
                />
              </div>

              <div class="auth-row">
                <label class="auth-label">
                  Selecciona una hora disponible
                </label>
                <div id="time-slots" class="slot-grid"></div>
              </div>

              <div class="auth-footer-row">
                <button type="button" id="back-to-step-1" class="slot-button">
                  Volver al paso anterior
                </button>
                <button type="submit" class="auth-button">
                  Continuar a confirmación
                </button>
              </div>
            </form>
          </div>

          <div id="step-3" class="wizard-content">
            <div class="auth-form">
              <p class="auth-label">
                Revisa los datos de tu cita antes de confirmar:
              </p>
              <ul class="summary-list">
                <li><strong>Psicólogo:</strong> <span id="summary-psychologist"></span></li>
                <li><strong>Fecha:</strong> <span id="summary-date"></span></li>
                <li><strong>Hora:</strong> <span id="summary-time"></span></li>
                <li><strong>Motivo:</strong> <span id="summary-notes"></span></li>
              </ul>

              <div class="auth-footer-row" style="margin-top: 1rem;">
                <button type="button" id="back-to-step-2" class="slot-button">
                  Editar fecha/hora
                </button>
                <button type="button" id="confirm-appointment" class="auth-button">
                  Confirmar cita
                </button>
              </div>
            </div>
          </div>

          <div id="wizard-message" class="auth-message"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "../js/supabaseClient.js";
      import { getCurrentUser } from "../js/auth.js";
      import { createAppointment } from "../js/appointments.js";

      const stepIndicators = document.querySelectorAll("[data-step-indicator]");
      const steps = {
        1: document.getElementById("step-1"),
        2: document.getElementById("step-2"),
        3: document.getElementById("step-3")
      };

      const psychologistSelect = document.getElementById("psychologist-select");
      const notesInput = document.getElementById("notes");
      const dateInput = document.getElementById("date-input");
      const timeSlotsContainer = document.getElementById("time-slots");

      const summaryPsychologist = document.getElementById("summary-psychologist");
      const summaryDate = document.getElementById("summary-date");
      const summaryTime = document.getElementById("summary-time");
      const summaryNotes = document.getElementById("summary-notes");

      const backToStep1Btn = document.getElementById("back-to-step-1");
      const backToStep2Btn = document.getElementById("back-to-step-2");
      const confirmBtn = document.getElementById("confirm-appointment");
      const messageBox = document.getElementById("wizard-message");

      const state = {
        user: null,
        psychologist: null,
        notes: "",
        date: null,
        time: null
      };

      function showMessage(text, type) {
        if (!messageBox) return;
        messageBox.textContent = text;
        messageBox.className = "auth-message";
        if (type === "error") {
          messageBox.classList.add("auth-message--error");
        } else if (type === "success") {
          messageBox.classList.add("auth-message--success");
        }
      }

      function goToStep(stepNumber) {
        Object.entries(steps).forEach(([num, el]) => {
          el.classList.toggle("wizard-content--active", Number(num) === stepNumber);
        });
        stepIndicators.forEach((el) => {
          const n = Number(el.dataset.stepIndicator);
          el.classList.toggle("wizard-step--active", n === stepNumber);
        });
        messageBox.className = "auth-message";
        messageBox.style.display = "none";
      }

      async function loadCurrentUser() {
        const { data, error } = await getCurrentUser();
        if (error || !data) {
          showMessage(
            "No se pudo obtener el usuario actual. Inicia sesión como paciente antes de agendar.",
            "error"
          );
          throw error || new Error("Sin usuario activo");
        }
        state.user = data;
      }

      async function loadPsychologists() {
        const { data, error } = await supabase
          .from("psicologos")
          .select("*")
          .eq("activo", true)
          .order("nombre_completo", { ascending: true });

        if (error) {
          console.error(error);
          if (psychologistSelect) {
            psychologistSelect.innerHTML =
              '<option value="">Error al cargar psicólogos</option>';
          }
          showMessage("No se pudieron cargar los psicólogos.", "error");
          return;
        }

        if (!data.length) {
          psychologistSelect.innerHTML =
            '<option value="">No hay psicólogos disponibles</option>';
          return;
        }

        psychologistSelect.innerHTML =
          '<option value="" disabled selected>Selecciona un psicólogo</option>';

        data.forEach((p) => {
          const option = document.createElement("option");
          option.value = p.id;
          option.textContent = p.nombre_completo || "Psicólogo sin nombre";
          option.dataset.especialidad = p.especialidad || "";
          psychologistSelect.appendChild(option);
        });
      }

      function buildTimeSlots() {
        const startHour = 8;
        const endHour = 18;
        const intervalMinutes = 60;

        const slots = [];
        for (let h = startHour; h < endHour; h++) {
          const hour = String(h).padStart(2, "0");
          const minute = "00";
          slots.push(\`\${hour}:\${minute}\`);
        }
        return slots;
      }

      async function markUnavailableSlots(date, psychologistId) {
        timeSlotsContainer.innerHTML = "";
        if (!date || !psychologistId) return;

        const allSlots = buildTimeSlots();

        const { data, error } = await supabase
          .from("citas")
          .select("hora, estado")
          .eq("psicologo_id", psychologistId)
          .eq("fecha", date)
          .not("estado", "eq", "cancelada");

        const occupied = new Set();
        if (!error && data) {
          data.forEach((cita) => {
            if (cita.hora) {
              occupied.add(cita.hora.slice(0, 5));
            }
          });
        }

        allSlots.forEach((slot) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = slot;
          btn.className = "slot-button";

          if (occupied.has(slot)) {
            btn.disabled = true;
          }

          btn.addEventListener("click", () => {
            if (btn.disabled) return;
            document
              .querySelectorAll(".slot-button--selected")
              .forEach((el) => el.classList.remove("slot-button--selected"));
            btn.classList.add("slot-button--selected");
            state.time = slot;
          });

          timeSlotsContainer.appendChild(btn);
        });
      }

      document
        .getElementById("step-1-form")
        ?.addEventListener("submit", async (event) => {
          event.preventDefault();
          const psychologistId = psychologistSelect.value;
          const notes = notesInput.value.trim();

          if (!psychologistId) {
            showMessage("Selecciona un psicólogo para continuar.", "error");
            return;
          }

          const selectedOption =
            psychologistSelect.options[psychologistSelect.selectedIndex];
          state.psychologist = {
            id: psychologistId,
            name: selectedOption.textContent,
            especialidad: selectedOption.dataset.especialidad || ""
          };
          state.notes = notes;

          goToStep(2);
        });

      document
        .getElementById("step-2-form")
        ?.addEventListener("submit", (event) => {
          event.preventDefault();
          const selectedDate = dateInput.value;
          if (!selectedDate || !state.time) {
            showMessage(
              "Selecciona una fecha y una hora disponible para continuar.",
              "error"
            );
            return;
          }

          state.date = selectedDate;

          summaryPsychologist.textContent = state.psychologist.name;
          summaryDate.textContent = state.date;
          summaryTime.textContent = state.time;
          summaryNotes.textContent = state.notes || "Sin especificar";

          goToStep(3);
        });

      backToStep1Btn?.addEventListener("click", () => {
        goToStep(1);
      });

      backToStep2Btn?.addEventListener("click", () => {
        goToStep(2);
      });

      dateInput?.addEventListener("change", () => {
        state.time = null;
        markUnavailableSlots(dateInput.value, state.psychologist?.id);
      });

      confirmBtn?.addEventListener("click", async () => {
        if (!state.user || !state.psychologist || !state.date || !state.time) {
          showMessage(
            "Faltan datos para crear la cita. Vuelve a los pasos anteriores.",
            "error"
          );
          return;
        }

        showMessage("Creando tu cita...", "success");

        const { data, error } = await createAppointment({
          pacienteId: state.user.id,
          psicologoId: state.psychologist.id,
          fecha: state.date,
          hora: state.time,
          notas: state.notes,
          estado: "pendiente"
        });

        if (error || !data) {
          console.error(error);
          showMessage(
            error?.message || "No se pudo crear la cita. Inténtalo de nuevo.",
            "error"
          );
          return;
        }

        showMessage("Cita creada correctamente. Redirigiendo a tu panel...", "success");
        setTimeout(() => {
          window.location.href = "./dashboard.html";
        }, 900);
      });

      (async function init() {
        try {
          await loadCurrentUser();
          await loadPsychologists();
          const today = new Date().toISOString().slice(0, 10);
          if (dateInput) {
            dateInput.min = today;
            dateInput.value = today;
          }
          if (state.psychologist?.id) {
            markUnavailableSlots(today, state.psychologist.id);
          }
        } catch (e) {
          console.error(e);
        }
      })();
    </script>
  </body>
</html>
